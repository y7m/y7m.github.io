---
layout: default
nav_scrolled: true
---
<div class="main-content">

    <article class="article-container section visible">

        <a href="{{ '/blog/' | relative_url }}" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Blog
        </a>

        <header class="article-header">
            <h1 class="article-title text-primary">{{ page.title }}</h1>
            <div class="article-meta">
                <span>{{ page.date | date: "%B %-d, %Y" }}</span>
                <span>•</span>
                <span>{{ page.content | number_of_words | divided_by: 200 | plus: 1 }} min read</span>
            </div>
        </header>

        <div class="article-content">
            {{ content }}
        </div>

        <div style="margin-top: 60px; padding-top: 30px; border-top: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px;">
            <p style="margin: 0; color: var(--text-muted); font-weight: 600;">Share this post or connect with me:</p>
            <div class="social-links" style="display: flex; gap: 16px;">
                <a href="mailto:mryotam@gmail.com" class="icon-btn" aria-label="Email" data-brand="email">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                </a>
                <a href="https://www.linkedin.com/in/y7m/" target="_blank" class="icon-btn" aria-label="LinkedIn" data-brand="linkedin">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                </a>
                <a href="https://github.com/y7m" target="_blank" class="icon-btn" aria-label="GitHub" data-brand="github">

                </a>
            </div>
        </div>

    </article>

</div>
