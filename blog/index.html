---
layout: default
nav_scrolled: true
title: Blog | Yotam
---

    <div class="main-content">

        <section class="visible">
            <div class="blog-header">
                <h1 class="text-primary" style="font-size: 3rem; font-weight: 800; margin-bottom: 10px;">Writing</h1>
                <p style="color: var(--text-muted); font-size: 1.1rem; font-weight:600;">Thoughts on software engineering, game dev, and life.</p>
            </div>

            <div class="blog-list">

                <!-- Dynamically generated posts -->
                {% for post in site.posts %}
                <a href="{{ post.url | relative_url }}" class="card blog-card">
                    <span class="blog-date">{{ post.date | date: "%B %-d, %Y" }}</span>
                    <h2 class="blog-title">{{ post.title }}</h2>
                    <p class="blog-excerpt">{{ post.content | strip_html | truncatewords: 25 }}</p>
                </a>
                {% endfor %}

            </div>
        </section>

    </div>
